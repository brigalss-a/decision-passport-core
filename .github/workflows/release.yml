name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e python/decision_passport_py
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm example:smoke
      - run: python -m decision_passport.verify examples/reference-integrations/webhook-approval-receipt.bundle.json
      - run: python -m decision_passport.verify examples/reference-integrations/agent-tool-execution-receipt.bundle.json
      - run: pnpm conformance
      - run: pnpm verify-demo

      - name: Resolve official release notes file
        id: notes
        shell: bash
        run: |
          notes_file="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "Missing canonical release notes file: $notes_file"
            exit 1
          fi
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          pnpm checksums > checksums.txt
          cat checksums.txt

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          for f in fixtures/*.json; do
            case "$f" in
              *".template.json") continue ;;
            esac
            cp "$f" release-artifacts/
          done
          cp checksums.txt release-artifacts/
          cp artifacts/verification-summary.json release-artifacts/
          cp artifacts/conformance-snapshot.json release-artifacts/

      - name: Verify release artifact completeness
        run: |
          test -f release-artifacts/conformance-manifest.json
          test -f release-artifacts/conformance-snapshot.json
          test -f release-artifacts/verification-summary.json
          test -f release-artifacts/checksums.txt
          ls -1 release-artifacts > release-artifacts/release-assets.txt
          cat release-artifacts/release-assets.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            release-artifacts/*
