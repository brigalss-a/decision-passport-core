name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm verify-demo

      - name: Generate checksums
        run: |
          pnpm checksums > checksums.txt
          cat checksums.txt

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp fixtures/valid-bundle.json release-artifacts/
          cp fixtures/tampered-bundle.json release-artifacts/
          cp checksums.txt release-artifacts/
          if [ -f artifacts/verification-summary.json ]; then
            cp artifacts/verification-summary.json release-artifacts/
          fi
          if [ -f docs/examples/bundle-diff-report.json ]; then
            cp docs/examples/bundle-diff-report.json release-artifacts/
          fi
          if [ -f docs/examples/bundle-diff-report.txt ]; then
            cp docs/examples/bundle-diff-report.txt release-artifacts/
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
