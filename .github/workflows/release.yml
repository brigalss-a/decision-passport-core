name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - run: corepack enable
      - run: corepack prepare pnpm@9.15.9 --activate
      - name: Print toolchain versions
        run: |
          node --version
          corepack --version
          pnpm --version

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: pnpm workflow:discipline
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e python/decision_passport_py
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm verifier:golden
      - run: pnpm example:smoke
      - run: python -m decision_passport.verify examples/reference-integrations/webhook-approval-receipt.bundle.json
      - run: python -m decision_passport.verify examples/reference-integrations/agent-tool-execution-receipt.bundle.json
      - run: pnpm conformance
      - run: pnpm verify-demo

      - name: Resolve official release notes file
        id: notes
        shell: bash
        run: |
          notes_file="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "Missing canonical release notes file: $notes_file"
            exit 1
          fi
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          pnpm checksums > checksums.txt
          cat checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-core.cdx.json
          upload-artifact: false

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          for f in fixtures/*.json; do
            case "$f" in
              *".template.json") continue ;;
            esac
            cp "$f" release-artifacts/
          done
          cp checksums.txt release-artifacts/
          cp sbom-core.cdx.json release-artifacts/
          cp artifacts/verification-summary.json release-artifacts/
          cp artifacts/conformance-snapshot.json release-artifacts/
          cp "${{ steps.notes.outputs.file }}" release-artifacts/

      - name: Verify release artifact completeness
        run: |
          test -f release-artifacts/conformance-manifest.json
          test -f release-artifacts/conformance-snapshot.json
          test -f release-artifacts/verification-summary.json
          test -f release-artifacts/checksums.txt
          test -f release-artifacts/sbom-core.cdx.json
          test -f "release-artifacts/${{ steps.notes.outputs.file }}"
          ls -1 release-artifacts > release-artifacts/release-assets.txt
          cat release-artifacts/release-assets.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release-artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            release-artifacts/*
