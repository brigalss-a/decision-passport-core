<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="40" fill="#0d1117" rx="12"/>
  <rect x="0" y="20" width="720" height="20" fill="#0d1117"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>
  <text x="360" y="25" text-anchor="middle" fill="#8b949e" font-size="13">Decision Passport — Browser Verifier</text>

  <!-- FAIL card -->
  <rect x="40" y="60" width="640" height="80" fill="#2d1117" stroke="#f85149" stroke-width="2" rx="10"/>
  <text x="80" y="95" fill="#f85149" font-size="28" font-weight="bold">✗ FAIL</text>
  <text x="80" y="120" fill="#ffa198" font-size="14">Bundle verification failed — tampering detected</text>

  <!-- Bundle meta -->
  <rect x="40" y="160" width="640" height="90" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="60" y="185" fill="#8b949e" font-size="12">BUNDLE VERSION</text>
  <text x="220" y="185" fill="#c9d1d9" font-size="12">1.4-basic</text>
  <text x="60" y="208" fill="#8b949e" font-size="12">RECORDS</text>
  <text x="220" y="208" fill="#c9d1d9" font-size="12">2</text>
  <text x="60" y="231" fill="#8b949e" font-size="12">CHAIN ID</text>
  <text x="220" y="231" fill="#c9d1d9" font-size="12">demo-chain-tampered</text>

  <!-- Checks -->
  <rect x="40" y="270" width="640" height="100" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="60" y="295" fill="#c9d1d9" font-size="14" font-weight="bold">Verification Checks</text>
  <text x="60" y="320" fill="#f85149" font-size="13">✗</text>
  <text x="80" y="320" fill="#c9d1d9" font-size="13">chain_integrity</text>
  <text x="300" y="320" fill="#ffa198" font-size="12">failed</text>
  <text x="60" y="345" fill="#f85149" font-size="13">✗</text>
  <text x="80" y="345" fill="#c9d1d9" font-size="13">manifest_chain_hash</text>
  <text x="300" y="345" fill="#ffa198" font-size="12">failed</text>

  <!-- Tamper explanation -->
  <rect x="40" y="390" width="640" height="110" fill="#2d1117" stroke="#f85149" stroke-width="1" rx="8"/>
  <text x="60" y="415" fill="#f85149" font-size="14" font-weight="bold">Tamper Analysis</text>
  <text x="60" y="440" fill="#ffa198" font-size="12">▸ payload_hash mismatch on record #0</text>
  <text x="80" y="460" fill="#8b949e" font-size="11">Expected: e279e5ea7994a34b…  Actual: a1b2c3d4e5f6…</text>
  <text x="60" y="483" fill="#ffa198" font-size="12">▸ record_hash mismatch on record #0</text>
</svg>
