  <!-- Chain summary -->
  <rect x="40" y="390" width="640" height="70" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="60" y="415" fill="#c9d1d9" font-size="14" font-weight="bold">Chain Summary</text>
  <text x="60" y="440" fill="#8b949e" font-size="12">chain_hash</text>
  <text x="160" y="440" fill="#c9d1d9" font-size="11">4ca189507cf859101e105105a80bda8d8672f1f8…</text>
