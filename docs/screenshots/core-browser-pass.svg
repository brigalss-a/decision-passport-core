      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title bar -->
