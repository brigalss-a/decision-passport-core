  <text x="220" y="208" fill="#c9d1d9" font-size="12">2</text>
  <text x="60" y="231" fill="#8b949e" font-size="12">CHAIN ID</text>
  <text x="220" y="231" fill="#c9d1d9" font-size="12">demo-chain-1774911763058</text>

  <!-- Checks -->
